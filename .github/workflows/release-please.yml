name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to manage release PRs against"
        required: false
        default: "main"
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release_state.outputs.release_created }}
      tag_name: ${{ steps.release_state.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Capture latest release before run
        id: before_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag="$(gh api repos/${GITHUB_REPOSITORY}/releases/latest --jq .tag_name 2>/dev/null || true)"
          echo "tag_name=${latest_tag}" >> "$GITHUB_OUTPUT"
      - name: Update release PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npx -y release-please release-pr \
            --repo-url "${GITHUB_REPOSITORY}" \
            --target-branch "${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || github.ref_name }}" \
            --config-file .release-please-config.json \
            --manifest-file .release-please-manifest.json \
            --token "${GITHUB_TOKEN}"
      - name: Create GitHub release if releasable
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npx -y release-please github-release \
            --repo-url "${GITHUB_REPOSITORY}" \
            --target-branch "${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || github.ref_name }}" \
            --config-file .release-please-config.json \
            --manifest-file .release-please-manifest.json \
            --token "${GITHUB_TOKEN}"
      - name: Capture release state after run
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag="$(gh api repos/${GITHUB_REPOSITORY}/releases/latest --jq .tag_name 2>/dev/null || true)"
          previous_tag="${{ steps.before_release.outputs.tag_name }}"
          if [[ -n "${latest_tag}" && "${latest_tag}" != "${previous_tag}" ]]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${latest_tag}" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
          fi

  publish-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    # release-please-created tags/releases do not trigger other workflows,
    # so we call the shared build/publish matrix directly here.
    uses: ./.github/workflows/release-pipeline.yml
    with:
      git_ref: refs/tags/${{ needs.release-please.outputs.tag_name }}
      publish: true
    secrets: inherit
