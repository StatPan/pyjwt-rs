name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies (test + bench extras)
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          uv pip install --python .venv pytest pyjwt cryptography maturin

      - name: Build extension (debug)
        env:
          RUSTFLAGS: -D warnings
        run: uv run --python .venv maturin develop

      - name: Run strict test gate
        run: uv run --python .venv python scripts/pytest_gate.py

  build-sdist-smoke:
    name: sdist + wheel smoke build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: pip install maturin
      - name: Build sdist
        run: maturin sdist --out dist
      - name: Build release wheel
        env:
          RUSTFLAGS: -D warnings
        run: maturin build --release --out dist --features vendored-openssl
      - name: List artifacts
        run: ls -la dist
      - uses: actions/upload-artifact@v6
        with:
          name: ci-artifacts-smoke
          path: dist/
          retention-days: 3
