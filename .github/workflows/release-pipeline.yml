name: Release Pipeline

on:
  workflow_call:
    inputs:
      git_ref:
        description: "Git ref (branch, SHA, or tag) to build from"
        required: true
        type: string
      publish:
        description: "Publish artifacts to PyPI after a successful build matrix"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  linux:
    name: Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel (manylinux)
        env:
          RUSTFLAGS: -D warnings
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2_28"
          args: --release --out dist -i python3.10 --features vendored-openssl
          sccache: true
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-core perl-IPC-Cmd
            elif command -v yum >/dev/null 2>&1; then
              yum install -y perl-core perl-IPC-Cmd
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache perl make
            fi
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    name: macOS wheels (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel
        env:
          RUSTFLAGS: -D warnings
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features vendored-openssl
          sccache: true
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: Windows wheels (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.target }}
      - name: Build wheel
        env:
          RUSTFLAGS: -D warnings
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features vendored-openssl
          sccache: true
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  publish:
    name: Publish to PyPI
    needs: [sdist, linux, macos, windows]
    if: inputs.publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyjwt-rs
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Publish via PyPI API token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
