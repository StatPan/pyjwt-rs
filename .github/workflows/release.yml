name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to PyPI after a successful build matrix"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

# The crate is built with PyO3's `abi3-py310` feature, so each platform
# produces a single wheel that works on CPython 3.10+ (tag cp310-abi3-*).
# This keeps the matrix at one row per (OS x architecture) - five wheels
# total: linux x86_64, linux aarch64, macos x86_64, macos aarch64, windows x64.

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  linux:
    name: Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel (manylinux)
        env:
          RUSTFLAGS: -D warnings
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # manylinux2014 (CentOS 7) binutils is too old for OpenSSL 3.x
          # assembly (fails on crypto/ec/x25519-x86_64.s). manylinux_2_28
          # (AlmaLinux 8) ships a newer toolchain and still has broad distro
          # coverage (glibc 2.28 = RHEL 8, Debian 10, Ubuntu 20.04+).
          manylinux: "2_28"
          args: --release --out dist --features vendored-openssl
          sccache: true
          before-script-linux: |
            # openssl-src (from openssl/vendored) needs a full Perl with
            # IPC::Cmd + the usual core modules (FindBin, File::Compare, ...).
            # perl-core bundles the core modules on both manylinux2014 (CentOS 7)
            # and newer dnf-based images; perl-IPC-Cmd is a separate package.
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-core perl-IPC-Cmd
            elif command -v yum >/dev/null 2>&1; then
              yum install -y perl-core perl-IPC-Cmd
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache perl make
            fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    name: macOS wheels (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        env:
          RUSTFLAGS: -D warnings
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features vendored-openssl
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: Windows wheels (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.target }}
      - name: Build wheel
        env:
          RUSTFLAGS: -D warnings
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features vendored-openssl
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  publish:
    name: Publish to PyPI
    needs: [sdist, linux, macos, windows]
    if: github.event_name == 'push' || inputs.publish == true
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyjwt-rs
    permissions:
      id-token: write   # OIDC trusted publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Publish via PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
