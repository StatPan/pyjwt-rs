name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  linux:
    name: Linux wheels (${{ matrix.target }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist -i python${{ matrix.python-version }} --features vendored-openssl
          sccache: true
          before-script-linux: |
            # openssl-src (pulled in by openssl/vendored) builds OpenSSL from
            # source, which requires a full Perl stack. The manylinux images
            # ship a minimal Perl; install the core modules it needs.
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-core perl-IPC-Cmd perl-FindBin perl-File-Compare perl-File-Copy
            elif command -v yum >/dev/null 2>&1; then
              yum install -y perl-core perl-IPC-Cmd perl-FindBin perl-File-Compare perl-File-Copy
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache perl make
            fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  macos:
    name: macOS wheels (${{ matrix.target }}, py${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python${{ matrix.python-version }} --features vendored-openssl
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  windows:
    name: Windows wheels (${{ matrix.target }}, py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.target }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python${{ matrix.python-version }} --features vendored-openssl
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  publish:
    name: Publish to PyPI
    needs: [sdist, linux, macos, windows]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyjwt-rs
    permissions:
      id-token: write   # OIDC trusted publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Publish via PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
