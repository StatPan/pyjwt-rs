name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to PyPI after a successful build matrix"
        required: false
        default: false
        type: boolean

jobs:
  release:
    # Wrapper entrypoint for manual/tag-triggered releases.
    uses: ./.github/workflows/release-pipeline.yml
    with:
      git_ref: ${{ github.ref }}
      publish: ${{ github.event_name == 'push' || inputs.publish == true }}
    secrets: inherit
